<!DOCTYPE html>
<html>
  <head>
    <title>
      challenge exercise 2
    </title>
    <style>
      .ride{
        font-size: 27px;
        font-weight: 500;
      }



      .pickup{
        display:block;
        padding-left:100px;
        padding-right:100px;
        padding-bottom: 10px;
        padding-top: 10px;
        border: none;
        border-radius: 5px;
        background-color:rgb(215, 215, 215);
        color:black;
        margin-bottom:8px;
        padding-left:15px;
      }

      .destination{
        display:block;
       padding-left:100px;
        padding-right:100px;
        padding-bottom: 10px;
        padding-top: 10px;
        border:none;
        border-radius: 5px;
        background-color: rgb(215, 215, 215);
        color: black;
        margin-bottom: 20px;
        padding-left: 15px;
      }

      .requestnow{    
        padding-left:15px;
        padding-right:15px;
        padding-bottom: 10px;
        padding-top: 10px;
        border:none;
        background-color:black;
        color:white;
        margin-right: 8px;
        cursor: pointer;
      }

      .schedule{
        padding-left:15px;
        padding-right:15px;
        padding-bottom: 10px;
        padding-top: 10px;
        border: none;
        background-color: rgb(215, 215, 215);
        color: black;
        margin-right: 8px;
        cursor: pointer;
      }
        
    </style>
  </head>
  <body>
    <p class="ride">
      Request a ride now 
    </p>
    <input class="pickup" type="text" placeholder="Enter pickup location">
    <input class="destination" type="text" placeholder="Enter destination">
    <button class="requestnow">
      Request now
    </button>
    <button class="schedule">
      Schedule for later
    </button>
  </body>
</html>
